name: Update Dcard Posts

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install playwright && python -m playwright install chromium --with-deps

      - name: Fetch Dcard popular posts
        run: python fetch_dcard.py --fast --limit 30

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json
          git diff --cached --quiet || git commit -m "update posts.json $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push
