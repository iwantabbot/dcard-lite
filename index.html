<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dcard Reader</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f2f2f2;--card:#fff;--text:#1a1a1a;--sub:#888;--accent:#006aa6;--border:#e0e0e0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
header{position:sticky;top:0;z-index:50;background:var(--accent);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.15)}
header h1{font-size:17px;font-weight:700}
header .meta{font-size:11px;opacity:.75;margin-top:2px}
.container{max-width:680px;margin:0 auto;padding:10px}
.status{text-align:center;padding:12px;color:var(--sub);font-size:13px}
.error{text-align:center;padding:30px 20px;color:#c00;font-size:14px;line-height:1.8}
.post{background:var(--card);border-radius:8px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.06);cursor:pointer;transition:box-shadow .15s}
.post:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.post-inner{padding:12px 14px}
.post-thumb{width:100%;max-height:200px;object-fit:cover;display:block;background:#eee}
.post-header{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.forum-tag{font-size:11px;color:var(--accent);background:#e8f4f8;padding:1px 7px;border-radius:3px;font-weight:600}
.post-title{font-size:15px;font-weight:600;line-height:1.45;margin-bottom:3px}
.post-excerpt{font-size:13px;color:#666;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.post-footer{display:flex;align-items:center;gap:14px;margin-top:8px;font-size:12px;color:var(--sub)}
.post-footer span{display:flex;align-items:center;gap:3px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:480px){.post-title{font-size:14px}.post-excerpt{font-size:12px}header h1{font-size:16px}}

/* Drawer overlay */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s ease}
.drawer-overlay.open{opacity:1;pointer-events:auto}

/* Drawer panel */
.drawer{position:fixed;z-index:101;background:var(--card);display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.32,.72,0,1)}
/* Desktop: right side */
@media(min-width:769px){
  .drawer{top:0;right:0;bottom:0;width:520px;max-width:90vw;border-left:1px solid var(--border);box-shadow:-4px 0 20px rgba(0,0,0,.12)}
  .drawer.closed{transform:translateX(100%)}
}
/* Mobile: bottom sheet */
@media(max-width:768px){
  .drawer{left:0;right:0;bottom:0;height:92vh;border-top:1px solid var(--border);border-radius:14px 14px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.12)}
  .drawer.closed{transform:translateY(100%)}
}
.drawer.open{transform:translate(0)}

/* Drawer handle (mobile) */
.drawer-handle{display:none;width:36px;height:4px;background:#ccc;border-radius:2px;margin:8px auto 0}
@media(max-width:768px){.drawer-handle{display:block}}

/* Drawer header */
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-head .forum-tag{font-size:11px;color:var(--accent);background:#e8f4f8;padding:1px 7px;border-radius:3px;font-weight:600}
.drawer-head .close-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--sub);padding:4px 8px;border-radius:6px;line-height:1}
.drawer-head .close-btn:hover{background:#f0f0f0}

/* Drawer body */
.drawer-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.drawer-title{font-size:17px;font-weight:700;line-height:1.45;margin-bottom:8px}
.drawer-meta{font-size:12px;color:var(--sub);margin-bottom:16px;display:flex;align-items:center;gap:12px}
.drawer-meta span{display:flex;align-items:center;gap:3px}
.drawer-content{font-size:14px;line-height:1.9;white-space:pre-wrap;color:#333;margin-bottom:20px}
.drawer-content img{max-width:100%;border-radius:6px;margin:8px 0;display:block}
.drawer-link{display:inline-block;font-size:13px;color:var(--accent);text-decoration:none;margin-bottom:20px}
.drawer-link:hover{text-decoration:underline}
.comments-header{font-size:13px;font-weight:600;color:var(--accent);border-top:1px solid var(--border);padding-top:12px;margin-bottom:10px}
.comment{padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.comment:last-child{border-bottom:none}
.comment-floor{font-size:11px;color:var(--sub);margin-bottom:3px}
.comment-text{line-height:1.6;color:#444}
.comment-likes{font-size:11px;color:var(--sub);margin-top:3px}
.no-content{color:var(--sub);font-style:italic;font-size:13px}
.drawer-loading{text-align:center;padding:40px;color:var(--sub);font-size:13px}
</style>
</head>
<body>
<header>
  <div>
    <h1>Dcard Reader</h1>
    <div class="meta" id="meta"></div>
  </div>
</header>
<div class="container" id="app"><div class="status"><span class="spinner"></span>載入中...</div></div>

<!-- Drawer -->
<div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer closed" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-head">
    <span class="forum-tag" id="drawerForum"></span>
    <button class="close-btn" onclick="closeDrawer()">&times;</button>
  </div>
  <div class="drawer-body" id="drawerBody">
    <div class="drawer-loading"><span class="spinner"></span></div>
  </div>
</div>

<script>
const app = document.getElementById('app');
const meta = document.getElementById('meta');
const overlay = document.getElementById('overlay');
const drawer = document.getElementById('drawer');
const drawerBody = document.getElementById('drawerBody');
const drawerForum = document.getElementById('drawerForum');
let currentPosts = [];

function timeAgo(s){
  if(!s)return '';
  const d=(Date.now()-new Date(s).getTime())/1000;
  if(d<60)return '剛剛';
  if(d<3600)return Math.floor(d/60)+' 分鐘前';
  if(d<86400)return Math.floor(d/3600)+' 小時前';
  return Math.floor(d/86400)+' 天前';
}

function esc(s){
  if(!s)return '';
  const d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML;
}

function renderContent(s){
  if(!s)return '';
  const parts=s.split(/(<img[^>]+>)/g);
  return parts.map(p=>{
    if(p.startsWith('<img'))return p;
    return esc(p);
  }).join('');
}

async function loadPosts(){
  try{
    const r=await fetch('posts.json');
    if(!r.ok)throw new Error();
    const data=await r.json();
    currentPosts=data.posts||[];
    meta.textContent='更新於 '+timeAgo(data.fetchedAt)+' ・ '+currentPosts.length+' 篇';
    app.innerHTML=currentPosts.map(p=>`
      <div class="post" onclick="openPost(${p.id})">
        ${p.thumbnail?`<img class="post-thumb" src="${esc(p.thumbnail)}" loading="lazy" alt="">`:''}
        <div class="post-inner">
          <div class="post-header"><span class="forum-tag">${esc(p.forumName||p.forumAlias)}</span></div>
          <div class="post-title">${esc(p.title)}</div>
          <div class="post-excerpt">${esc(p.excerpt)}</div>
          <div class="post-footer">
            <span>&#9825; ${(p.likeCount||0).toLocaleString()}</span>
            <span>&#128172; ${(p.commentCount||0).toLocaleString()}</span>
            <span>${timeAgo(p.createdAt)}</span>
          </div>
        </div>
      </div>`).join('');
  }catch(e){
    app.innerHTML='<div class="error">無法載入資料</div>';
  }
}

function openPost(id){
  const post=currentPosts.find(p=>p.id===id);
  if(!post)return;

  drawerForum.textContent=post.forumName||post.forumAlias||'';
  drawerBody.innerHTML='<div class="drawer-loading"><span class="spinner"></span></div>';

  overlay.classList.add('open');
  drawer.classList.remove('closed');
  drawer.classList.add('open');
  document.body.style.overflow='hidden';

  // Build content
  let h=`<div class="drawer-title">${esc(post.title)}</div>`;
  h+=`<div class="drawer-meta">
    <span>&#9825; ${(post.likeCount||0).toLocaleString()}</span>
    <span>&#128172; ${(post.commentCount||0).toLocaleString()}</span>
    <span>${timeAgo(post.createdAt)}</span>
  </div>`;

  if(post.content){
    h+=`<div class="drawer-content">${renderContent(post.content)}</div>`;
  }else{
    h+='<div class="no-content">（無內文）</div>';
  }

  h+=`<a class="drawer-link" href="https://www.dcard.tw/f/${post.forumAlias||''}/p/${id}" target="_blank">在 Dcard 開啟全文 &#8599;</a>`;

  if(post.comments&&post.comments.length){
    h+=`<div class="comments-header">留言 (${post.comments.length})</div>`;
    h+=post.comments.map(c=>`
      <div class="comment">
        <div class="comment-floor">B${c.floor}${c.createdAt?' ・ '+timeAgo(c.createdAt):''}</div>
        <div class="comment-text">${esc(c.content)}</div>
        ${c.likeCount?`<div class="comment-likes">&#9825; ${c.likeCount}</div>`:''}
      </div>`).join('');
  }

  // Slight delay for animation feel
  setTimeout(()=>{drawerBody.innerHTML=h;drawerBody.scrollTop=0;},150);
}

function closeDrawer(){
  overlay.classList.remove('open');
  drawer.classList.remove('open');
  drawer.classList.add('closed');
  drawer.style.transform='';
  overlay.style.opacity='';
  document.body.style.overflow='';
}

// ESC to close
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer()});

// Drag-to-dismiss (mobile) — follows finger, snaps back or closes
let dragY0=0, dragging=false;
function onDragStart(e){
  if(drawerBody.scrollTop>0)return;
  dragY0=e.touches[0].clientY;
  dragging=true;
  drawer.style.transition='none';
  overlay.style.transition='none';
}
function onDragMove(e){
  if(!dragging)return;
  const dy=Math.max(0,e.touches[0].clientY-dragY0);
  const vh=window.innerHeight;
  const pct=Math.min(dy/(vh*0.45),1); // 0→1 over 45% of screen
  drawer.style.transform=`translateY(${pct*100}%)`;
  overlay.style.opacity=0.4*(1-pct);
}
function onDragEnd(){
  if(!dragging)return;
  dragging=false;
  drawer.style.transition='';
  overlay.style.transition='';
  const cur=drawer.style.transform;
  const match=cur.match(/translateY\((.+)%\)/);
  const pct=match?parseFloat(match[1]):0;
  if(pct>35){
    closeDrawer();
  }else{
    drawer.style.transform='';
    overlay.style.opacity='';
  }
}
drawer.addEventListener('touchstart',onDragStart,{passive:true});
drawer.addEventListener('touchmove',onDragMove,{passive:true});
drawer.addEventListener('touchend',onDragEnd);
drawer.addEventListener('touchcancel',onDragEnd);

loadPosts();
</script>
</body>
</html>
